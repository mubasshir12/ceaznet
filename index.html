    <style>
      :root {
        --app-font-family: 'Geist Sans', sans-serif;
        --app-border-radius: 1rem;
      }
      html {
        height: 100dvh;
        width: 100%;
        overflow: hidden; /* Prevent scroll on html */
        background-color: #F9F6F2;
      }
      html.dark {
        background-color: #000000;
      }
      
      /* --- Dynamic Border Radius Overrides --- */
      /* Small / Sharp */
      html[data-radius="small"] .rounded-lg { border-radius: 0.25rem !important; }
      html[data-radius="small"] .rounded-xl { border-radius: 0.375rem !important; }
      html[data-radius="small"] .rounded-2xl { border-radius: 0.5rem !important; }
      html[data-radius="small"] .rounded-3xl { border-radius: 0.75rem !important; }
      
      /* Medium / Soft (Default-ish) */
      html[data-radius="medium"] .rounded-lg { border-radius: 0.5rem !important; }
      html[data-radius="medium"] .rounded-xl { border-radius: 0.75rem !important; }
      html[data-radius="medium"] .rounded-2xl { border-radius: 1rem !important; }
      html[data-radius="medium"] .rounded-3xl { border-radius: 1.5rem !important; }

      /* Large / Round */
      html[data-radius="large"] .rounded-lg { border-radius: 0.75rem !important; }
      html[data-radius="large"] .rounded-xl { border-radius: 1rem !important; }
      html[data-radius="large"] .rounded-2xl { border-radius: 1.5rem !important; }
      html[data-radius="large"] .rounded-3xl { border-radius: 2rem !important; }

      /* Full / Extra Round */
      html[data-radius="full"] .rounded-lg { border-radius: 1rem !important; }
      html[data-radius="full"] .rounded-xl { border-radius: 1.5rem !important; }
      html[data-radius="full"] .rounded-2xl { border-radius: 2rem !important; }
      html[data-radius="full"] .rounded-3xl { border-radius: 2.5rem !important; }

      /* Hide scrollbar for elements with no-scrollbar class */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }


      body {
        height: 100dvh;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden; /* Prevent scroll on body */
        position: fixed; /* Lock body in place */
        top: 0;
        left: 0;
        overscroll-behavior: none; /* Disable pull-to-refresh effects */
        /* Default font size, overridden by JS */
        font-size: 14px;
        background-color: transparent;
      }
      /* Font Family Classes applied to Body */
      body.font-sans { font-family: 'Geist Sans', sans-serif; --app-font-family: 'Geist Sans', sans-serif; }
      body.font-serif { font-family: 'Source Serif 4', serif; --app-font-family: 'Source Serif 4', serif; }
      body.font-mono { font-family: 'JetBrains Mono', monospace; --app-font-family: 'JetBrains Mono', monospace; }
      body.font-inter { font-family: 'Inter', sans-serif; --app-font-family: 'Inter', sans-serif; }
      body.font-playfair { font-family: 'Playfair Display', serif; --app-font-family: 'Playfair Display', serif; }
      body.font-quicksand { font-family: 'Quicksand', sans-serif; --app-font-family: 'Quicksand', sans-serif; }

      /* Layout Density Classes */
      body.layout-compact .prose-style h1, 
      body.layout-compact .prose-style h2, 
      body.layout-compact .prose-style h3 {
          margin-top: 1em;
          margin-bottom: 0.5em;
      }
      body.layout-compact .prose-style p {
          margin-top: 0.5em;
          margin-bottom: 0.5em;
      }
      
      /* Disable tap highlight globally for a native app feel */
      * {
        -webkit-tap-highlight-color: transparent !important;
      }
      #root {
        height: 100dvh; 
        width: 100%;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      
      .font-brand {
        font-family: 'Great Vibes', cursive;
      }
      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      .code-scrollbar::-webkit-scrollbar {
        height: 8px;
      }
      .code-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .code-scrollbar::-webkit-scrollbar-thumb {
        background-color: rgba(156, 163, 175, 0.5); /* gray-400 with opacity */
        border-radius: 4px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      .dark .code-scrollbar::-webkit-scrollbar-thumb {
        background-color: rgba(107, 114, 128, 0.5); /* gray-500 with opacity */
      }
      
      /* Custom Scrollbar for New Code Block */
      .custom-scrollbar::-webkit-scrollbar {
        height: 10px;
        width: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #cbd5e1; /* slate-300 */
        border-radius: 5px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #4b5563; /* gray-600 */
      }
      .custom-scrollbar::-webkit-scrollbar-corner {
        background: transparent;
      }

      .text-3d-effect {
        /* A subtle shadow to give a slight lift */
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.15);
      }
      .dark .text-3d-effect {
        /* A slightly more pronounced shadow might be needed in dark mode to be visible */
        text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.25);
      }
      .image-reveal-container {
        position: relative;
        /* Hides the image by clipping it from the bottom, to reveal from bottom-to-top */
        clip-path: inset(0 0 100% 0);
        /* Animate the clip-path property over 1.5s for a smooth reveal */
        transition: clip-path 1.5s cubic-bezier(0.25, 1, 0.5, 1);
      }
      .image-reveal-container.is-loaded {
        /* Reveals the image by setting all insets to 0 */
        clip-path: inset(0 0 0 0);
      }
      .dark .blurry-text-effect p,
      .dark .blurry-text-effect li,
      .dark .blurry-text-effect h1,
      .dark .blurry-text-effect h2,
      .dark .blurry-text-effect h3,
      .dark .blurry-text-effect h4,
      .dark .blurry-text-effect h5,
      .dark .blurry-text-effect h6 {
        /* A more pronounced multi-layered shadow to create a soft, glassy glow behind the text, enhancing readability in dark mode. */
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.3), 0 0 24px rgba(255, 255, 255, 0.15);
      }
      .dark .blurry-text-effect code,
      .dark .blurry-text-effect pre {
        text-shadow: none !important;
      }
      .dev-console-log p {
        margin-top: 0.25rem;
        margin-bottom: 0.25rem;
      }
      .dev-console-log p:first-child {
        margin-top: 0;
      }
      .dev-console-log p:last-child {
        margin-bottom: 0;
      }
      .dev-console-log ul, .dev-console-log ol {
        margin: 0.25rem 0;
        padding-left: 1.25rem;
      }
      @keyframes fade-in-up {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
      }
      .animate-fade-in-up {
          animation: fade-in-up 0.4s ease-out forwards;
          opacity: 0; /* Start hidden */
      }
      @keyframes slide-up-fade {
          from {
              opacity: 0;
              transform: translateY(8px);
          }
          to {
              opacity: 1;
              transform: translateY(0);
          }
      }
      .animate-slide-up-fade {
          animation: slide-up-fade 0.3s ease-out forwards;
      }
      @keyframes highlight-fade {
          0% { 
            box-shadow: 0 0 0 8px rgba(251, 191, 36, 0.3); 
            background-color: rgba(251, 191, 36, 0.1);
          }
          100% { 
            box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); 
            background-color: transparent;
          }
      }
      .highlight-message {
          animation: highlight-fade 2.5s ease-out forwards;
          border-radius: 1rem;
      }
      /* Text specific highlight for navigation */
      @keyframes text-highlight-pulse {
        0% { background-color: rgba(251, 191, 36, 0.0); }
        10% { background-color: rgba(251, 191, 36, 0.3); }
        100% { background-color: rgba(251, 191, 36, 0.0); }
      }
      .highlight-text-content {
        animation: text-highlight-pulse 2s ease-out;
        border-radius: 0.5rem;
      }
      .voice-transcription-text {
        font-family: var(--app-font-family);
        text-shadow: 0 0 10px rgba(0, 0, 0, 0.7), 0 0 20px rgba(0, 0, 0, 0.5);
      }
      .scroll-fade {
        -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 5%, black 95%, transparent 100%);
        mask-image: linear-gradient(to bottom, transparent 0%, black 5%, black 95%, transparent 100%);
      }
      .scroll-fade-horizontal {
        -webkit-mask-image: linear-gradient(to right, black 0%, black 90%, transparent 100%);
        mask-image: linear-gradient(to right, black 0%, black 90%, transparent 100%);
      }
      @keyframes shimmer {
          to {
              background-position-x: -200%;
          }
      }
      .shimmer-bg {
          background-color: #e5e5e5; /* neutral-200 */
          background-image: linear-gradient(110deg, #e5e5e5 8%, #f0f0f0 18%, #e5e5e5 33%); /* neutral-200, lighter gray, neutral-200 */
          background-size: 200% 100%;
          animation: shimmer 2.5s linear infinite; /* Slower animation */
      }
      .dark .shimmer-bg {
          background-color: #000000; 
          background-image: linear-gradient(110deg, #000000 8%, #111111 18%, #000000 33%); /* dark bg, slightly lighter dark bg, dark bg */
          background-size: 200% 100%;
      }
      .line-clamp-2 {
        overflow: hidden;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }
      .line-clamp-3 {
        overflow: hidden;
        display: -webkit-box;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 3;
      }

      /* New styles for bouncing dots loader */
      @keyframes bounce-custom-anim {
        0%, 80%, 100% {
          transform: scale(0);
        }
        40% {
          transform: scale(1.0);
        }
      }
      .animate-bounce-custom {
        animation: bounce-custom-anim 1.4s infinite ease-in-out both;
      }
      .bounce-1 { animation-delay: -0.32s; }
      .bounce-2 { animation-delay: -0.16s; }
      .bounce-3 { animation-delay: 0s; }

      .prose-style p, .prose-style li, .prose-style td {
        color: #374151; /* gray-700 */
      }
      .dark .prose-style p, .dark .prose-style li, .dark .prose-style td {
        color: #d1d5db; /* gray-300 */
      }
      .prose-style h1, .prose-style h2, .prose-style h3, .prose-style h4, .prose-style h5, .prose-style h6 {
        font-family: var(--app-font-family);
        font-weight: 700;
        color: #111827; /* gray-900 */
        margin-top: 1.5em;
        margin-bottom: 0.75em;
        line-height: 1.2;
      }
      .dark .prose-style h1, .dark .prose-style h2, .dark .prose-style h3, .dark .prose-style h4, .dark .prose-style h5, .dark .prose-style h6 {
        color: #f9fafb; /* gray-50 */
      }
      .prose-style h1 { font-size: 1.875rem; }
      .prose-style h2 { font-size: 1.5rem; }
      .prose-style h3 { font-size: 1.25rem; }
      .prose-style h4 { font-size: 1.125rem; }

      .prose-style strong {
        font-weight: 600;
        color: #111827;
      }
      .dark .prose-style strong {
        color: #f9fafb;
      }

      /* New styles for streaming text */
      @keyframes word-fade-in-stream {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .streaming-word {
          opacity: 0;
          animation: word-fade-in-stream 0.4s ease forwards;
      }

      /* Article Reader Styles */
      .article-header h1 {
        font-family: var(--app-font-family);
        font-weight: 800; /* Bolder for impact */
        font-size: 2.75rem; /* More refined headline */
        line-height: 1.15;
        color: #111827; /* gray-900 */
        margin-bottom: 1rem;
      }
      .dark .article-header h1 {
        color: #f9fafb; /* gray-50 */
      }
      .article-byline {
        font-family: var(--app-font-family);
        color: #6b7280; /* gray-500 */
        text-transform: uppercase;
        font-size: 0.875rem;
        letter-spacing: 0.05em;
      }
      .dark .article-byline {
        color: #9ca3af; /* gray-400 */
      }
      .article-image-caption {
        font-size: 0.875rem;
        color: #6b7280; /* gray-500 */
        text-align: center;
        margin-top: 0.5rem;
      }
      .dark .article-image-caption {
        color: #9ca3af; /* gray-400 */
      }
      .article-body .prose-style p, .article-body .prose-style li {
        font-family: 'Source Serif 4', serif; /* Classic serif for readability */
        font-size: 1.125rem; /* 18px */
        line-height: 1.8;
      }
      .article-body .prose-style p:first-of-type::first-letter {
        font-family: var(--app-font-family);
        font-weight: 700;
        font-size: 4.5rem; /* Large drop cap */
        float: left;
        line-height: 0.75;
        margin-right: 0.5rem;
        padding-top: 0.25rem;
        color: #111827;
      }
      .dark .article-body .prose-style p:first-of-type::first-letter {
        color: #f9fafb;
      }
       @keyframes background-pan {
        0% { background-position: 0% center; }
        100% { background-position: 100% center; }
      }
      .bg-pan-animation {
        background-size: 200% 200%;
        animation: background-pan 30s linear infinite alternate;
      }
      @keyframes progress-bar-anim {
          from { width: 0%; }
          to { width: 100%; }
      }
      @keyframes progress-shimmer {
          from { background-position: -100% 0; }
          to { background-position: 100% 0; }
      }
      .progress-bar-shimmer {
          background-image: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
          background-size: 200% 100%;
          animation: progress-shimmer 1.5s infinite;
      }

      /* Reading Progress Bar */
      .reading-progress-bar {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 4px;
          z-index: 50;
          pointer-events: none;
      }
      .reading-progress-bar-inner {
          height: 100%;
          background: linear-gradient(90deg, #f59e0b, #ef4444);
          width: 0%;
          transition: width 0.1s linear;
      }

      /* Like Animation */
      @keyframes like-heart-anim {
          0% { transform: scale(0.5); opacity: 0.8; }
          50% { transform: scale(1.2); opacity: 1; }
          100% { transform: scale(1.5); opacity: 0; }
      }
      .animate-like-heart {
          animation: like-heart-anim 0.7s ease-out forwards;
      }
      
      /* --- Custom Lucide Icons for Finance Notes (Masking) --- */
      .f-icon {
        display: inline-block;
        width: 1.1em;
        height: 1.1em;
        vertical-align: text-bottom;
        background-color: currentColor; /* Takes the text color context */
        -webkit-mask-repeat: no-repeat;
        mask-repeat: no-repeat;
        -webkit-mask-position: center;
        mask-position: center;
        -webkit-mask-size: contain;
        mask-size: contain;
      }

    <script>
      // On page load or when changing themes, best to add inline in `head` to avoid FOUC
      const theme = localStorage.getItem('theme');
      let isDark;

      if (theme === 'dark') {
          isDark = true;
      } else if (theme === 'light') {
          isDark = false;
      } else { // This covers 'system' or theme not being set
          isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      }

      if (isDark) {
          document.documentElement.classList.add('dark');
          document.getElementById('hljs-light-theme')?.setAttribute('disabled', 'true');
          document.getElementById('hljs-dark-theme')?.removeAttribute('disabled');
      } else {
          document.documentElement.classList.remove('dark');
          document.getElementById('hljs-light-theme')?.removeAttribute('disabled');
          document.getElementById('hljs-dark-theme')?.setAttribute('disabled', 'true');
      }
    </script>
